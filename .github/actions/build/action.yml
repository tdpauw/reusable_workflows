name: Build
description: Runs make build to execute the project build lifecycle
inputs:
  version:
    description: The version to pass to the make build command
    required: false
runs:
  using: 'composite'
  steps:

  - name: Build
    id: build
    shell: bash
    run: make build ${{ inputs.version != '' && format('version={0}', inputs.version) || '' }}
